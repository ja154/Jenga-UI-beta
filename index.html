<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JengaUI: AI-Powered UI Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              'brand-bg':        '#07111f',
              'brand-surface':   '#0f1b31',
              'brand-panel':     '#162644',
              'brand-primary':   '#22c55e',
              'brand-secondary': '#38bdf8',
              'brand-muted':     '#8ba0bd',
              'brand-border':    'rgba(148, 163, 184, 0.16)',
              'brand-glow':      'rgba(34, 197, 94, 0.16)',
            },
            backgroundImage: {
              'cta-gradient': 'linear-gradient(135deg, #22c55e 0%, #38bdf8 100%)',
              'aurora': 'radial-gradient(circle at top left, rgba(56,189,248,0.22), transparent 36%), radial-gradient(circle at 80% 10%, rgba(34,197,94,0.18), transparent 30%), linear-gradient(180deg, rgba(11,19,34,0.95) 0%, rgba(7,17,31,1) 100%)',
            },
            animation: {
              'pulse-fast':  'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in':     'fadeIn 0.4s ease-out forwards',
              'slide-up':    'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shimmer':     'shimmer 2.4s linear infinite',
              'aurora-pan':  'auroraPan 16s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeIn:  { '0%': { opacity: 0 },                                     '100%': { opacity: 1 } },
              slideUp: { '0%': { transform: 'translateY(12px)', opacity: 0 },       '100%': { transform: 'translateY(0)', opacity: 1 } },
              shimmer: { '0%': { backgroundPosition: '-200% center' },              '100%': { backgroundPosition: '200% center' } },
              auroraPan: {
                '0%': { transform: 'translate3d(-2%, 0, 0) scale(1)' },
                '100%': { transform: 'translate3d(2%, -2%, 0) scale(1.04)' },
              },
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    color-scheme: dark;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 32%),
      radial-gradient(circle at 82% 10%, rgba(34, 197, 94, 0.14), transparent 24%),
      linear-gradient(180deg, #0b1322 0%, #07111f 48%, #050d18 100%);
    color: #e2e8f0;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #root {
    min-height: 100vh;
  }

  .bg-orb-1 {
    position: fixed; top: -14%; left: -10%; width: 760px; height: 760px;
    background: radial-gradient(circle, rgba(56,189,248,0.18) 0%, transparent 72%);
    border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(6px);
    animation: auroraPan 18s ease-in-out infinite alternate;
  }
  .bg-orb-2 {
    position: fixed; top: 18%; right: -10%; width: 620px; height: 620px;
    background: radial-gradient(circle, rgba(34,197,94,0.14) 0%, transparent 68%);
    border-radius: 50%; pointer-events: none; z-index: 0;
    animation: auroraPan 22s ease-in-out infinite alternate-reverse;
  }
  .bg-orb-3 {
    position: fixed; bottom: -12%; left: 28%; width: 540px; height: 540px;
    background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(16px);
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-size: 56px 56px;
    background-image:
      linear-gradient(to right, rgba(148,163,184,0.055) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(148,163,184,0.055) 1px, transparent 1px);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 92%);
  }

  .glass {
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.82) 0%, rgba(12, 19, 35, 0.88) 100%);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(148, 163, 184, 0.15);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 30px 80px rgba(2, 6, 23, 0.42);
  }

  .btn-cta {
    background: linear-gradient(135deg, #22c55e 0%, #38bdf8 100%);
    background-size: 200% auto;
    transition: background-position 0.4s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }
  .btn-cta:hover:not(:disabled) {
    background-position: right center;
    box-shadow: 0 16px 40px rgba(8, 47, 73, 0.35), 0 0 28px rgba(34,197,94,0.22);
    transform: translateY(-1px);
  }
  .btn-cta:active:not(:disabled) { transform: translateY(0); }

  .section-shell {
    position: relative;
    overflow: hidden;
    border-radius: 30px;
    border: 1px solid rgba(148, 163, 184, 0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    box-shadow: 0 28px 80px rgba(2, 6, 23, 0.35);
  }

  .section-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 28%),
      radial-gradient(circle at bottom left, rgba(34,197,94,0.08), transparent 24%);
    pointer-events: none;
  }

  :focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
  }

  ::-webkit-scrollbar       { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.22); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.35); }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
  <body class="min-h-screen relative selection:bg-emerald-500/25 selection:text-emerald-100">
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>
    <div class="bg-grid"></div>
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
